<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#220a1a"/>
      <stop offset="100%" stop-color="#0a0008"/>
    </radialGradient>
    <radialGradient id="stamGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="45%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: dark deep purple-black, app-icon rounded corners -->
  <rect width="512" height="512" rx="96" fill="#0a0008"/>
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- ═══ TANGO ROSE ═══ -->
  <g transform="translate(256,256)" filter="url(#glow)">

    <!-- Layer 1: Outermost petals — pale pink, translucent -->
    <ellipse cx="0" cy="-100" rx="62" ry="100" fill="#f8bbd0" opacity="0.45"/>
    <ellipse cx="0" cy="-100" rx="62" ry="100" fill="#f8bbd0" opacity="0.45" transform="rotate(72)"/>
    <ellipse cx="0" cy="-100" rx="62" ry="100" fill="#f8bbd0" opacity="0.45" transform="rotate(144)"/>
    <ellipse cx="0" cy="-100" rx="62" ry="100" fill="#f8bbd0" opacity="0.45" transform="rotate(216)"/>
    <ellipse cx="0" cy="-100" rx="62" ry="100" fill="#f8bbd0" opacity="0.45" transform="rotate(288)"/>

    <!-- Layer 2: Second ring — bright magenta, offset 36° -->
    <ellipse cx="0" cy="-84" rx="54" ry="84" fill="#E91E63" opacity="0.82" transform="rotate(36)"/>
    <ellipse cx="0" cy="-84" rx="54" ry="84" fill="#E91E63" opacity="0.82" transform="rotate(108)"/>
    <ellipse cx="0" cy="-84" rx="54" ry="84" fill="#E91E63" opacity="0.82" transform="rotate(180)"/>
    <ellipse cx="0" cy="-84" rx="54" ry="84" fill="#E91E63" opacity="0.82" transform="rotate(252)"/>
    <ellipse cx="0" cy="-84" rx="54" ry="84" fill="#E91E63" opacity="0.82" transform="rotate(324)"/>

    <!-- Layer 3: Mid ring — deep crimson -->
    <ellipse cx="0" cy="-64" rx="44" ry="64" fill="#c2185b"/>
    <ellipse cx="0" cy="-64" rx="44" ry="64" fill="#c2185b" transform="rotate(72)"/>
    <ellipse cx="0" cy="-64" rx="44" ry="64" fill="#c2185b" transform="rotate(144)"/>
    <ellipse cx="0" cy="-64" rx="44" ry="64" fill="#c2185b" transform="rotate(216)"/>
    <ellipse cx="0" cy="-64" rx="44" ry="64" fill="#c2185b" transform="rotate(288)"/>

    <!-- Layer 4: Inner ring — darkest crimson, offset 36° -->
    <ellipse cx="0" cy="-44" rx="30" ry="44" fill="#880e4f" transform="rotate(36)"/>
    <ellipse cx="0" cy="-44" rx="30" ry="44" fill="#880e4f" transform="rotate(108)"/>
    <ellipse cx="0" cy="-44" rx="30" ry="44" fill="#880e4f" transform="rotate(180)"/>
    <ellipse cx="0" cy="-44" rx="30" ry="44" fill="#880e4f" transform="rotate(252)"/>
    <ellipse cx="0" cy="-44" rx="30" ry="44" fill="#880e4f" transform="rotate(324)"/>

    <!-- Stamen: golden amber glow -->
    <circle r="34" fill="url(#stamGrad)"/>
    <circle r="22" fill="#FFA000" opacity="0.7"/>
    <circle r="12" fill="#e65100"/>
    <circle r="5"  fill="#bf360c"/>

  </g>
</svg>
